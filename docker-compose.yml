version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Strong_Password123!
    ports:
      - "1433:1433"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_Strong_Password123!\" -Q \"SELECT 1\" -No || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db_init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: db_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql
    command: /bin/bash -c "sleep 5 && /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'Your_Strong_Password123!' -d master -i /init.sql"

  worker:
    build:
      context: .
      dockerfile: src/BatchProcessing/Dockerfile
    depends_on:
      db_init:
        condition: service_completed_successfully
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BatchDb;User Id=sa;Password=Your_Strong_Password123!;TrustServerCertificate=True;
    deploy:
      replicas: 10
